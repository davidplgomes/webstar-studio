<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WEBSTAR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Space Grotesk', 'sans-serif'],
            display: ['Syne', 'sans-serif'],
            serif: ['Cormorant Garamond', 'serif'],
          },
          letterSpacing: {
            'tighter': '-0.05em',
            'extreme': '0.3em',
            'mega': '0.5em',
          },
          letterSpacing: {
            'extreme': '0.3em',
            'mega': '0.5em',
          },
          colors: {
            'neon-lime': '#cfff28',
            'deep-space': '#000000',
            'soft-white': '#f3f8f0',
            'lavender-mist': '#d2c5ff',
            'deep-teal': '#345c59',
          }
        }
      }
    }
  </script>
  <style>
    .stroke-text {
      -webkit-text-stroke: 1px rgba(255, 255, 255, 0.3);
      color: transparent;
    }

    .stroke-text-dark {
      -webkit-text-stroke: 1px rgba(3, 3, 3, 0.2);
      color: transparent;
    }

    .stroke-text-thick {
      -webkit-text-stroke: 2px rgba(255, 255, 255, 0.1);
      color: transparent;
    }

    @keyframes scan {
      0% {
        transform: translateX(-100%) skewX(12deg);
      }

      100% {
        transform: translateX(200%) skewX(12deg);
      }
    }

    .animate-scan {
      animation: scan 3s infinite linear;
    }

    body {
      background-color: #000000;
      color: #f3f8f0;
      overflow-x: hidden;
      font-family: 'Outfit', sans-serif;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-family: 'Raleway', sans-serif;
    }

    .font-editorial {
      font-family: 'Cormorant Garamond', serif;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #030303;
    }

    ::-webkit-scrollbar-thumb {
      background: #18181B;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #cfff28;
    }

    /* Used for text-outline over 3D backgrounds */
    .stroke-text-lime {
      -webkit-text-stroke: 2px #cfff28;
      color: transparent;
    }

    .glass-technical {
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.05),
        0 8px 32px 0 rgba(0, 0, 0, 0.8),
        0 0 40px rgba(207, 255, 40, 0.03);
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .glass-technical:hover {
      background: rgba(0, 0, 0, 0.55);
      border-color: rgba(207, 255, 40, 0.2);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.1),
        0 8px 32px 0 rgba(0, 0, 0, 0.8),
        0 0 60px rgba(207, 255, 40, 0.08);
    }

    .noise-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.04;
      /* Microscopic opacity for clean aesthetic */
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }
  </style>
</head>

<body>
  <div class="noise-overlay"></div>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
